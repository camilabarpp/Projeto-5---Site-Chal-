<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Chalé Hotel</title>
    <link rel="stylesheet" type="text/css" href="css/estilo.css">
</head>
<body>
<!--Ínicio container-->
    <div id="container">
<!--Ínicio topo-->
        <div id="topo">
            <div id="area-logo">
                <h1 class="logo">
                    <a href="">Chalé Hotel</a>
                </h1>
            </div>

            <div id="area-menu">
                <!--id "conteudo menu" será criado para podermos distanciar
                o texto da primeira imagem e não sobrepo-la-->
                <div id="conteudo-menu">
                    <div id="menu-locais">
                        <span class="locais">
                            Rio de Janeiro - São Paulo - Belo Horizonte
                        </span>
                        <a class="reserva" href="">Reservar</a>
                        <!--Usar "style="clear: both;" para limpar o elemento flutuante "float"
                        definido no estilo.css-->
                        <div style="clear: both;"></div>
                    </div>
                    <!--Barra de navegação vertical-->
                    <div id="menu">
                        <ul id="navegacao">
                            <li><a href="">Home</a></li>
                            <li><a href="">História</a></li>
                            <li><a href="">Imprensa</a></li>
                            <li><a href="">Gastronomia</a></li>
                            <li><a href="">Contato</a></li>
                        </ul>

                        <img class="depoimento" src="imagens/depoimento.png" alt="depoimento">
                    </div>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
